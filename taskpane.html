<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MailPro AI</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

    :root {
      --ink: #1a1a2e;
      --muted: #6b7080;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --success: #059669;
      --success-light: #ecfdf5;
      --border: #e4e7ef;
      --bg: #f8f9fc;
      --white: #ffffff;
      --shadow: 0 2px 12px rgba(26,26,46,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      color: var(--ink);
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }

    .main {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .tone-selector {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .tone-selector label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      display: block;
      margin-bottom: 10px;
    }

    .tone-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .action-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .action-card label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      display: block;
      margin-bottom: 10px;
    }

    .btn-main {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      letter-spacing: -0.2px;
    }

    .btn-main:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: var(--shadow); }
    .btn-main:active { transform: translateY(0); }
    .btn-main:disabled { background: #93c5fd; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-secondary {
      width: 100%;
      padding: 11px;
      background: var(--success-light);
      color: var(--success);
      border: 1.5px solid #a7f3d0;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      margin-top: 10px;
    }

    .btn-secondary:hover { background: #d1fae5; }

    .result-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: none;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card.visible { display: block; }

    .result-card label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      display: block;
      margin-bottom: 10px;
    }

    .result-text {
      font-size: 13px;
      line-height: 1.65;
      color: var(--ink);
      white-space: pre-wrap;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      max-height: 200px;
      overflow-y: auto;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      display: none;
    }

    .status.loading {
      background: var(--accent-light);
      color: var(--accent);
      display: flex;
    }

    .status.error {
      background: #fef2f2;
      color: #dc2626;
      display: flex;
    }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #bfdbfe;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .diff-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      background: #fef3c7;
      color: #92400e;
      margin-left: 6px;
    }

    footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">✦</div>
  <div>
    <h1>MailPro AI</h1>
    <span>Propulsé par Claude · Anthropic</span>
  </div>
</header>

<div class="main">

  <div class="tone-selector">
    <label>🎨 Ton du message</label>
    <div class="tone-pills">
      <div class="pill active" data-tone="professionnel_chaleureux">Professionnel & chaleureux</div>
      <div class="pill" data-tone="formel">Formel</div>
      <div class="pill" data-tone="concis">Concis</div>
      <div class="pill" data-tone="auto">Auto (contexte)</div>
    </div>
  </div>

  <div class="action-card">
    <label>⚡ Action</label>
    <button class="btn-main" id="btnCorrect" onclick="correctEmail()">
      <span>✦</span> Corriger & améliorer mon mail
    </button>
  </div>

  <div class="status" id="status">
    <div class="spinner"></div>
    <span>Analyse et amélioration en cours…</span>
  </div>

  <div class="result-card" id="resultCard">
    <label>✅ Résultat <span class="diff-badge" id="diffBadge"></span></label>
    <div class="result-text" id="resultText"></div>
    <button class="btn-secondary" onclick="replaceEmail()">
      ↩ Remplacer dans mon mail
    </button>
  </div>

</div>

<footer>MailPro AI — vos données ne sont pas stockées</footer>

<script>
  let correctedText = '';
  let selectedTone = 'professionnel_chaleureux';

  // Tone selector
  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      selectedTone = pill.dataset.tone;
    });
  });

  const toneDescriptions = {
    professionnel_chaleureux: "Adopte un ton professionnel mais chaleureux et humain. Soigne la politesse, reste accessible et bienveillant.",
    formel: "Adopte un ton formel et soutenu, adapté à une correspondance officielle ou institutionnelle.",
    concis: "Sois concis et direct. Garde uniquement l'essentiel, phrases courtes et claires.",
    auto: "Analyse le contexte du message et adapte automatiquement le ton le plus approprié."
  };

  Office.onReady(info => {
    if (info.host !== Office.HostType.Outlook) {
      document.getElementById('status').className = 'status error';
      document.getElementById('status').innerHTML = '⚠️ Ce complément nécessite Outlook.';
    }
  });

  async function correctEmail() {
    const btn = document.getElementById('btnCorrect');
    const status = document.getElementById('status');
    const resultCard = document.getElementById('resultCard');

    // Récupérer le corps du mail
    Office.context.mailbox.item.body.getAsync(
      Office.CoercionType.Text,
      async (result) => {
        if (result.status !== Office.AsyncResultStatus.Succeeded) {
          showError("Impossible de lire le corps du mail.");
          return;
        }

        const originalText = result.value.trim();
        if (!originalText) {
          showError("Le mail est vide. Écris d'abord ton message.");
          return;
        }

        // UI loading
        btn.disabled = true;
        status.className = 'status loading';
        resultCard.classList.remove('visible');

        const toneInstruction = toneDescriptions[selectedTone];

        const prompt = `Tu es un assistant expert en rédaction professionnelle en français.

${toneInstruction}

Voici le mail original de l'utilisateur :
---
${originalText}
---

Ta tâche :
1. Corrige toutes les fautes d'orthographe, grammaire et typographie.
2. Améliore la formulation pour qu'elle soit claire, fluide et professionnelle.
3. Conserve EXACTEMENT le même sens et les mêmes informations.
4. Ne rajoute pas de contenu inventé.
5. Réponds UNIQUEMENT avec le texte du mail corrigé, sans commentaire, sans explication, sans balises markdown.`;

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              messages: [{ role: "user", content: prompt }]
            })
          });

          const data = await response.json();
          correctedText = data.content?.[0]?.text?.trim() || '';

          if (!correctedText) throw new Error("Réponse vide.");

          // Compter les différences approximatives
          const origWords = originalText.split(/\s+/).length;
          const corrWords = correctedText.split(/\s+/).length;
          const diff = Math.abs(origWords - corrWords);

          document.getElementById('resultText').textContent = correctedText;
          document.getElementById('diffBadge').textContent = diff > 0 ? `~${diff} mots ajustés` : 'optimisé';
          resultCard.classList.add('visible');
          status.className = 'status';

        } catch (err) {
          showError("Erreur lors de la connexion à l'IA. Vérifie ta connexion.");
          console.error(err);
        }

        btn.disabled = false;
      }
    );
  }

  function replaceEmail() {
    if (!correctedText) return;

    Office.context.mailbox.item.body.setAsync(
      correctedText,
      { coercionType: Office.CoercionType.Text },
      (result) => {
        if (result.status === Office.AsyncResultStatus.Succeeded) {
          const btn = document.querySelector('.btn-secondary');
          btn.textContent = '✅ Mail remplacé !';
          btn.style.background = '#d1fae5';
          setTimeout(() => {
            btn.textContent = '↩ Remplacer dans mon mail';
          }, 2500);
        } else {
          showError("Impossible de modifier le mail.");
        }
      }
    );
  }

  function showError(msg) {
    const status = document.getElementById('status');
    status.className = 'status error';
    status.innerHTML = `⚠️ ${msg}`;
    document.getElementById('btnCorrect').disabled = false;
  }
</script>
</body>
</html>
